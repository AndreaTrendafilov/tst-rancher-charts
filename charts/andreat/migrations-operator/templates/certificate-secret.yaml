# Generate self-signed certificate for webhook server
# This uses a pre-install hook to create the certificate before the operator starts

# ServiceAccount for certificate generation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "migrations-operator.fullname" . }}-cert-gen
  namespace: migrations-system
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
# RBAC for the certificate generation job
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "migrations-operator.fullname" . }}-cert-gen
  namespace: migrations-system
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "migrations-operator.fullname" . }}-cert-gen
  namespace: migrations-system
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "migrations-operator.fullname" . }}-cert-gen
subjects:
- kind: ServiceAccount
  name: {{ include "migrations-operator.fullname" . }}-cert-gen
  namespace: migrations-system
---
# Job to generate the certificate
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "migrations-operator.fullname" . }}-gen-certs
  namespace: migrations-system
  labels:
    {{- include "migrations-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: {{ include "migrations-operator.fullname" . }}-cert-gen
      restartPolicy: Never
      containers:
      - name: generate-certs
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e
          
          echo "Generating self-signed certificate..."
          
          # Generate certificate using openssl
          openssl req -x509 -newkey rsa:2048 \
            -keyout /tmp/tls.key \
            -out /tmp/tls.crt \
            -days 3650 \
            -nodes \
            -subj "/CN=migrations-operator-webhook-service.migrations-system.svc"
          
          echo "Creating Kubernetes secret..."
          
          # Create secret using kubectl (will update if exists)
          kubectl create secret tls {{ include "migrations-operator.fullname" . }}-webhook-server-cert \
            --cert=/tmp/tls.crt \
            --key=/tmp/tls.key \
            --namespace=migrations-system \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "Certificate secret created successfully!"
