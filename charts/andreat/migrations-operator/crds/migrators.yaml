# This CRD is installed automatically by Helm before other resources
# It's placed in the crds/ directory so Helm installs it first
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: migrators.migrations.coderanger.net
  annotations:
    # ArgoCD should replace (not delete and recreate) on updates
    argocd.argoproj.io/sync-options: Replace=true
spec:
  group: migrations.coderanger.net
  names:
    kind: Migrator
    listKind: MigratorList
    plural: migrators
    singular: migrator
  scope: Namespaced
  versions:
  - name: v1beta1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        description: Migrator is the Schema for the migrators API
        type: object
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource'
            type: string
          metadata:
            type: object
          spec:
            description: MigratorSpec defines the desired state of Migrator
            type: object
            required:
            - selector
            properties:
              selector:
                description: Selector for which pods to watch
                type: object
                properties:
                  matchLabels:
                    type: object
                    additionalProperties:
                      type: string
                  matchExpressions:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        operator:
                          type: string
                        values:
                          type: array
                          items:
                            type: string
              templateSelector:
                description: Optional selector for specific pod to use as template
                type: object
                properties:
                  matchLabels:
                    type: object
                    additionalProperties:
                      type: string
                  matchExpressions:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        operator:
                          type: string
                        values:
                          type: array
                          items:
                            type: string
              command:
                description: Command to run for migrations
                type: array
                items:
                  type: string
              args:
                description: Arguments for the migration command
                type: array
                items:
                  type: string
              image:
                description: Optional image override for migration job
                type: string
              container:
                description: Name of container from template to use
                type: string
              labels:
                description: Labels to add to migration job pods
                type: object
                additionalProperties:
                  type: string
              annotations:
                description: Annotations to add to migration job pods
                type: object
                additionalProperties:
                  type: string
          status:
            description: MigratorStatus defines the observed state of Migrator
            type: object
            properties:
              conditions:
                description: Conditions represent the latest available observations
                type: array
                items:
                  type: object
                  properties:
                    lastTransitionTime:
                      type: string
                      format: date-time
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
              lastSuccessfulMigration:
                description: The image digest of the last successful migration (used to detect new images)
                type: string
              lastMigrationTime:
                description: Last time migrations were run
                type: string
                format: date-time
              lastMigrationJob:
                description: Name of the last migration job
                type: string
              observedGeneration:
                description: The generation observed by the controller
                type: integer
                format: int64
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    - name: Last Digest
      type: string
      jsonPath: .status.lastSuccessfulMigration
      priority: 1
    - name: Last Migration
      type: date
      jsonPath: .status.lastMigrationTime
    - name: Last Job
      type: string
      jsonPath: .status.lastMigrationJob

