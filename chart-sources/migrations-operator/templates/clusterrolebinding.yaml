apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "migrations-operator.fullname" . }}
  labels:
    {{- include "migrations-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "migrations-operator.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "migrations-operator.serviceAccountName" . }}
  namespace: migrations-system

